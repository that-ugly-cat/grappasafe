services:
  api:
    build: .
    restart: unless-stopped
    volumes:
      - ./data:/data
      - ./map_tiles:/app/map_tiles   # tile OpenTopoMap offline, servite su /map-tiles
      - ./vector_tiles:/app/vector_tiles   # tile vettoriali (build_vector_tiles.sh), su /vector-tiles
    environment:
      - GRAPPASAFE_DB=/data/grappasafe.db
    env_file:
      - .env
    ports:
      - "127.0.0.1:8010:8000"   # esposto solo su localhost, Nginx fa da proxy
