{% extends "base.html" %}
{% block nav %}{% endblock %}
{% block content %}
<div style="max-width:380px;margin:4rem auto;">
  <div class="card">
    <h2 style="margin-bottom:1.5rem;text-align:center">🏔 GrappaSafe</h2>
    <form method="post" action="/login">
      <label>Username
        <input type="text" name="username" required autofocus>
      </label>
      <label>Password
        <input type="password" name="password" required>
      </label>
      {% if error %}<p class="error">{{ error }}</p>{% endif %}
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:1rem">Accedi</button>
    </form>
  </div>
</div>
{% endblock %}
