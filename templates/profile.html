{% extends "base.html" %}
{% block title %}Profilo — GrappaSafe{% endblock %}
{% block content %}
<div class="card">
  <h2 style="margin-bottom:1rem">{{ t('profile.title') }}</h2>
  <form method="post" action="/profile">
    <label>{{ t('profile.name') }} <input type="text" name="nome" value="{{ user.nome }}" required></label>
    <label>{{ t('profile.surname') }} <input type="text" name="cognome" value="{{ user.cognome }}" required></label>
    <label>{{ t('profile.phone') }} <input type="tel" name="telefono" value="{{ user.telefono or '' }}"></label>
    <label>{{ t('profile.dob') }} <input type="date" name="data_nascita" value="{{ user.data_nascita or '' }}"></label>
    <hr style="margin:1.2rem 0">
    <h4>{{ t('profile.emergencyContact') }}</h4>
    <label>{{ t('profile.contactName') }} <input type="text" name="emergenza_contatto" value="{{ user.emergenza_contatto or '' }}"></label>
    <label>{{ t('profile.contactPhone') }} <input type="tel" name="emergenza_telefono" value="{{ user.emergenza_telefono or '' }}"></label>
    <hr style="margin:1.2rem 0">
    <h4>{{ t('profile.medical') }}</h4>
    <label>{{ t('profile.bloodType') }} <input type="text" name="gruppo_sanguigno" value="{{ user.gruppo_sanguigno or '' }}" placeholder="{{ t('profile.bloodTypePh') }}"></label>
    <label>{{ t('profile.healthNotes') }} <textarea name="note_salute" rows="3" placeholder="{{ t('profile.healthNotesPh') }}">{{ user.note_salute or '' }}</textarea></label>
    <hr style="margin:1.2rem 0">
    <label>{{ t('profile.language') }}
      <select name="lingua">
        {% for l in web_langs %}<option value="{{ l }}" {% if user.lingua == l %}selected{% endif %}>{{ web_lang_names[l] }}</option>{% endfor %}
      </select>
    </label>
    <button type="submit" class="btn btn-primary" style="margin-top:1.2rem">{{ t('common.save') }}</button>
    <a href="/me" class="btn" style="margin-left:.5rem">{{ t('common.cancel') }}</a>
  </form>
  <p style="color:#888;font-size:.9rem;margin-top:1rem">
    {{ t('profile.devicesNoteHtml') | safe }}
  </p>
</div>
{% endblock %}
